spring:
  application:
    name: api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cleanbank}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

seedData:
  email: admin@cleanbank.com
  password: admin123

server:
  port: ${SERVER_PORT:8080}

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

jwt:
  secret-key: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:https://api.devblo.com}
  audience: ${JWT_AUDIENCE:devblo-clients}
  expiration-ms: ${JWT_EXPIRATION:3600000}

logging:
  level:
    org.springframework.security: WARN
    com.devblo: INFO
    org.flywaydb: DEBUG